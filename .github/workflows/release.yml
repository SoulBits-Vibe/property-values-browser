name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to update
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare release files
        run: npm run make-release

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/property-values-browser/main.js dist/property-values-browser/manifest.json dist/property-values-browser/styles.css --clobber

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/property-values-browser/main.js
            dist/property-values-browser/manifest.json
            dist/property-values-browser/styles.css
